name: Deploy to Hostinger (SSH)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project (Force Production)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APIFY_API_TOKEN: ${{ secrets.VITE_APIFY_API_TOKEN }}
          VITE_APIFY_ACTOR_ID: ${{ secrets.VITE_APIFY_ACTOR_ID }}

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: 🚀 Force-Sync to /jobs/ (Resilient Mode)
        run: |
          # 1. Clean out any old confusion with increased timeout
          ssh -p 65002 -o ConnectTimeout=60 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "rm -rf domains/upanita.app/public_html/*"
          
          # 2. Sync fresh build with extra patience
          rsync -avz --delete \
            -e "ssh -p 65002 -o ConnectTimeout=120 -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:domains/upanita.app/public_html/
          
          # 3. Double-check: list the folder
          ssh -p 65002 -o ConnectTimeout=60 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "ls -la domains/upanita.app/public_html/"

      - name: 🔄 Set up 301 Redirect on Old Domain (upanita.com/jobs)
        run: |
          ssh -p 65002 -o ConnectTimeout=60 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
            mkdir -p domains/upanita.com/public_html/jobs/ && \
            echo '<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteRule ^(.*)$ https://upanita.app/\$1 [R=301,L]
</IfModule>' > domains/upanita.com/public_html/jobs/.htaccess
          "