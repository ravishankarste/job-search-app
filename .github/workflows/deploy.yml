name: Deploy to Hostinger (SSH)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APIFY_API_TOKEN: ${{ secrets.VITE_APIFY_API_TOKEN }}
          VITE_APIFY_ACTOR_ID: ${{ secrets.VITE_APIFY_ACTOR_ID }}

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: 🚀 Deploy via rsync (Hostinger SSH)
        run: |
          rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u816535991/domains/upanita.com/public_html/jobs/