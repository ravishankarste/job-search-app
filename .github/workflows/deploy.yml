name: Deploy to Hostinger (SSH)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project (Force Production)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APIFY_API_TOKEN: ${{ secrets.VITE_APIFY_API_TOKEN }}
          VITE_APIFY_ACTOR_ID: ${{ secrets.VITE_APIFY_ACTOR_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: "🚀 Sync to Production (Primary Root: upanita.com)"
        run: |
          # 1. Sync to upanita.com (Protecting lab/runner subfolders)
          # Deletes root files but leaves the 'lab', 'runner', and 'jobs' directories alone
          ssh -p 65002 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "find domains/upanita.com/public_html/ -maxdepth 1 ! -name 'lab' ! -name 'runner' ! -name 'jobs' ! -path 'domains/upanita.com/public_html/' -exec rm -rf {} +"
          rsync -avz --delete --exclude 'lab' --exclude 'runner' --exclude 'jobs' -e "ssh -p 65002" dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:domains/upanita.com/public_html/
          
          # 2. Sync to upanita.app (Mirror/Backup)
          ssh -p 65002 -o ConnectTimeout=60 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "rm -rf domains/upanita.app/public_html/*"
          rsync -avz --delete -e "ssh -p 65002 -o ConnectTimeout=120" dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:domains/upanita.app/public_html/
          
          # 3. Verification
          ssh -p 65002 -o ConnectTimeout=60 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "ls -la domains/upanita.com/public_html/"