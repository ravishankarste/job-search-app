name: Deploy to Hostinger (SSH)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project (Force Production)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APIFY_API_TOKEN: ${{ secrets.VITE_APIFY_API_TOKEN }}
          VITE_APIFY_ACTOR_ID: ${{ secrets.VITE_APIFY_ACTOR_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: "🚀 Sync to Production (Primary Root: upanita.com)"
        run: |
          # Debug: Test connectivity first
          nc -zv -w 10 141.136.43.105 65002 || echo "NETWORK BLOCK DETECTED: Port 65002 unreachable"
          
          # 1. Sync to upanita.com (Protecting lab/runner subfolders)
          ssh -vvv -p 65002 -o ConnectTimeout=120 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@141.136.43.105 "find domains/upanita.com/public_html/ -maxdepth 1 ! -name 'lab' ! -name 'runner' ! -name 'jobs' ! -path 'domains/upanita.com/public_html/' -exec rm -rf {} +"
          rsync -avz --delete --exclude 'lab' --exclude 'runner' --exclude 'jobs' -e "ssh -vvv -p 65002 -o ConnectTimeout=120" dist/ ${{ secrets.SSH_USERNAME }}@141.136.43.105:domains/upanita.com/public_html/
          
          # 2. Sync to upanita.app (Mirror/Backup)
          ssh -vvv -p 65002 -o ConnectTimeout=120 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@141.136.43.105 "rm -rf domains/upanita.app/public_html/*"
          rsync -avz --delete -e "ssh -vvv -p 65002 -o ConnectTimeout=120" dist/ ${{ secrets.SSH_USERNAME }}@141.136.43.105:domains/upanita.app/public_html/
          
          # 3. Verification
          ssh -vvv -p 65002 -o ConnectTimeout=120 -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@141.136.43.105 "ls -la domains/upanita.com/public_html/"